<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

</head>

<body>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;"
             color-space="sRGB"
             renderer="colorManagement: true, physicallyCorrectLights"
             vr-mode-ui="enabled: false"
             device-orientation-permission-ui="enabled: false">

        <a-assets>
            <!-- モデル -->
            <a-asset-item id="avatarModel" src="./models/character.glb"></a-asset-item>

            <!-- 音声 -->
            <audio id="voice1" src="./voice1.mp3"></audio>
            <audio id="voice2" src="./voice2.mp3"></audio>
            <audio id="voice3" src="./voice3.mp3"></audio>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- ライト -->
        <a-entity light="type: ambient; intensity: 1"></a-entity>
        <a-entity light="type: directional; intensity: 1" position="1 1 1"></a-entity>

        <!-- ターゲット -->
        <a-entity mindar-image-target="targetIndex: 0" id="target">

            <!-- アバター -->
            <a-gltf-model src="#avatarModel"
                          position="0 0 0.3"
                          scale="0.1 0.1 0.1"
                          animation-mixer="clip: HumanArmature|HumanArmature|Man_Jump; loop: repeat"
                          animation__rotate="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
            </a-gltf-model>

            <!-- 吹き出し背景 -->
            <a-plane position="0 0.6 0.3"
                     width="0.7"
                     height="0.25"
                     material="color: white; opacity: 0.8; shader: flat">
            </a-plane>

            <!-- ★テキストは別にする -->
            <a-entity id="speech"
                      position="0 0.6 0.31"
                      text="value: タップしてください; align: center; color: black; width: 2">
            </a-entity>

        </a-entity>

    </a-scene>

    <script>
        document.addEventListener("DOMContentLoaded", () => {

            const target = document.querySelector("#target");
            const speech = document.querySelector("#speech");

            const voices = [
                document.querySelector("#voice1"),
                document.querySelector("#voice2"),
                document.querySelector("#voice3")
            ];

            const texts = [
                "こんにちは！",
                "ジャンプしてます！",
                "タップで進みます！"
            ];

            let index = 0;

            // マーカー検出で表示
            target.addEventListener("targetFound", () => {
                speech.setAttribute("visible", true);
            });

            // マーカー外れたら非表示
            target.addEventListener("targetLost", () => {
                speech.setAttribute("visible", false);
            });

            // タップで次へ
            document.body.addEventListener("click", () => {

                // 音声停止
                voices.forEach(v => v.pause());

                // テキスト更新
                speech.setAttribute(
                    "text",
                    "value: " + texts[index] + "; align: center; color: black"
                );

                // 音声再生
                voices[index].currentTime = 0;
                voices[index].play();

                index++;
                if (index >= texts.length) index = 0;

            });

        });
    </script>
</body>
</html>
