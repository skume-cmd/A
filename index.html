<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

    <!-- Three.js（これだけ追加） -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.126/build/three.min.js"></script>

    <!-- MindAR -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-three.prod.js"></script>

    <!-- GLTFLoader -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.126/examples/js/loaders/GLTFLoader.js"></script>

</head>

<body>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
        }

        video, canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover; /* ← 超重要 */
        }

        #ar-container {
            width: 100vw;
            height: 100vh;
            position: fixed;
        }

        #debug {
            position: fixed;
            top: 0;
            left: 0;
            color: red;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
            font-size: 20px;
        }
    </style>
    <div id="ar-container"></div>
    <div id="debug"></div>
    <button id="rescanBtn" style="
position: fixed;
bottom: 20px;
left: 50%;
transform: translateX(-50%);
z-index: 9999;
padding: 12px 20px;
font-size: 16px;
display: none; /* ← 最初は隠す */
">
        再スキャン
    </button>
    <script>
        window.addEventListener("load", async () => {

            const debug = document.getElementById("debug");
            const rescanBtn = document.getElementById("rescanBtn");

            const log = (msg) => {
                console.log(msg);
                debug.innerHTML += msg + "<br>";
            };

            let mindarThree;

            const startAR = async () => {

                mindarThree = new window.MINDAR.IMAGE.MindARThree({
                    container: document.querySelector("#ar-container"),
                    imageTargetSrc: './targets.mind'
                });

                const { renderer, scene, camera } = mindarThree;

                // ライト
                const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
                scene.add(light);

                // モデル読み込み
                const loader = new THREE.GLTFLoader();
                const gltf = await loader.loadAsync('./avatar_1.glb');

                // anchor
                const anchor = mindarThree.addAnchor(0);

                anchor.onTargetFound = () => {
                    log("認識した！");
                    rescanBtn.style.display = "block";
                };

                anchor.onTargetLost = () => {
                    rescanBtn.style.display = "none";
                };

                gltf.scene.scale.set(0.5, 0.5, 0.5);
                gltf.scene.position.set(0, 0, 0);

                anchor.group.add(gltf.scene);

                await mindarThree.start();

                renderer.setAnimationLoop(() => {
                    renderer.render(scene, camera);
                });

                renderer.setSize(window.innerWidth, window.innerHeight);

                window.addEventListener("resize", () => {
                    renderer.setSize(window.innerWidth, window.innerHeight);
                });
            };

            // 初回起動
            await startAR();

            // 再スキャン（安定版：作り直し）
            rescanBtn.addEventListener("click", async () => {
                rescanBtn.style.display = "none";

                if (mindarThree) {
                    await mindarThree.stop();
                }

                await startAR();
            });

        });
    </script>

</body>
</html>
