<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <title>MindAR v1.1.4 Stable</title>

    <meta name="viewport"
             content="width=device-width,
            initial-scale=1.0,
            maximum-scale=1.0,
            user-scalable=no,
            viewport-fit=cover">

    <style>
         html, body {
               margin: 0;
               padding: 0;
               width: 100%;
               height: 100%;
               overflow: hidden;
               background: black;

        }

          #ar-container {
               position: fixed;
               inset: 0;

        }

         canvas,
         video {
               position: absolute;
               width: 100% !important;
               height: 100% !important;
               object-fit: cover;
               pointer-events: none; /* :white_check_mark: Android最重要 */

        }

          #startButton {
               position: fixed;
               bottom: 20px;
               left: 50%;
               transform: translateX(-50%);
               z-index: 9999;
               pointer-events: auto;
               touch-action: manipulation;
               padding: 14px 28px;
               font-size: 16px;
               border-radius: 999px;
               border: none;
               background: white;
               color: black;

        }
    </style>

    <!-- :white_check_mark: Three.js（必ず先） -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.140.2/build"></script>

    <!-- :white_check_mark: MindAR v1.1.4（script タグ必須） -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-three.prod.js"></script>
</head>

<body>

    <div id="ar-container"></div>
    <button id="startButton">ARを開始</button>

    <script>
        const container = document.getElementById("ar-container");

        const mindarThree = new window.MINDAR.IMAGE.MindARThree({
            container: container,
            imageTargetSrc: "./marker.mind",
        });

        const { renderer, scene, camera } = mindarThree;

        scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1));

        const anchor = mindarThree.addAnchor(0);
        anchor.group.add(
            new THREE.Mesh(
                new THREE.BoxGeometry(0.3, 0.3, 0.3),
                new THREE.MeshStandardMaterial({ color: 0xff0000 })
            )
        );

        document.getElementById("startButton").onclick = async () => {
            await mindarThree.start();
            renderer.setAnimationLoop(() => {
                renderer.render(scene, camera);
            });
        };
    </script>

</body>
</html>
