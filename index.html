<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

    <!-- Three.js（これだけ追加） -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.126/build/three.min.js"></script>

    <!-- MindAR -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-three.prod.js"></script>

    <!-- GLTFLoader -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.126/examples/js/loaders/GLTFLoader.js"></script>

</head>

<body>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
        }

        video, canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover; /* ← 超重要 */
        }

        #ar-container {
            width: 100vw;
            height: 100vh;
            position: fixed;
        }

        #debug {
            position: fixed;
            top: 0;
            left: 0;
            color: red;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
            font-size: 20px;
        }
    </style>
    <div id="ar-container"></div>
    <div id="debug"></div>
    <script>
        window.addEventListener("load", async () => {
            const debug = document.getElementById("debug");

            const log = (msg) => {
                console.log(msg);
                debug.innerHTML += msg + "<br>";
            };
            const mindarThree = new window.MINDAR.IMAGE.MindARThree({
                container: document.body,
                imageTargetSrc: './targets.mind'
            });

            const { renderer, scene, camera } = mindarThree;

            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            scene.add(light);

            const loader = new THREE.GLTFLoader();
            const gltf = await loader.loadAsync('./avatar_1.glb');

            const anchor = mindarThree.addAnchor(0);
            anchor.group.add(gltf.scene);

            gltf.scene.scale.set(0.5, 0.5, 0.5);

            await mindarThree.start();

            renderer.setAnimationLoop(() => {
                renderer.render(scene, camera);
            });

        });
    </script>

</body>
</html>
