<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>
</head>

<body>
    <a-scene  mindar-image="imageTargetSrc: targets.mind;" embedded
              vr-mode-ui="enabled: false"
              device-orientation-permission-ui="enabled: false">

        <!-- アセット -->
        <a-assets>
            <a-asset-item id="avatarModel" src="avatar_1.glb"></a-asset-item>
        </a-assets>

        <!-- マーカー検出用（表示物なし） -->
        <a-entity    id="marker"
                     mindar-image-target="targetIndex: 0">
        </a-entity>

        <!-- カメラ -->
        <a-camera look-controls="enabled: false">

            <!-- :white_check_mark: 画面中央に出すアバター -->
            <a-entity      id="avatar"
                           position="0 -0.3 -1.5"
                           rotation="0 0 0"
                           scale="0.6 0.6 0.6"
                           visible="false">

                <a-gltf-model        src="#avatarModel"
                                     animation-mixer="clip: Idle; loop: repeat">
                </a-gltf-model>

            </a-entity>

        </a-camera>
    </a-scene>

    <script>
        document.addEventListener("DOMContentLoaded", () => {

            const marker = document.querySelector("#marker");
            const avatar = document.querySelector("#avatar");

            // :white_check_mark: nullチェック（デバッグにも便利）
            console.log("marker:", marker);
            console.log("avatar:", avatar);

            if (!marker || !avatar) {
                console.error("要素が見つかりません");
                return;
            }

            marker.addEventListener("targetFound", () => {
                avatar.setAttribute("visible", "true");
            });

        });
    </script>

</body>
</html>
