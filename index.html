<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <title>MindAR Camera Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- :white_check_mark: 正しい script タグ -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindarprod.js"></script>
</head>

<body style="margin:0; overflow:hidden;">
    <script>
        window.addEventListener("DOMContentLoaded", async () => {

            console.log("MindAR start");

            const mindarThree = new window.MINDAR.IMAGE.MindARThree({
                container: document.body,
                imageTargetSrc: "./marker.mind",
            });

            const { renderer, scene, camera } = mindarThree;

            // ライト
            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            scene.add(light);

            // マーカー0
            const anchor = mindarThree.addAnchor(0);

            const geometry = new THREE.BoxGeometry(0.3, 0.3, 0.3);
            const material = new THREE.MeshStandardMaterial({ color: 0xff0000 });
            const cube = new THREE.Mesh(geometry, material);

            anchor.group.add(cube);

            // :white_check_mark: カメラ起動
            await mindarThree.start();

            renderer.setAnimationLoop(() => {
                renderer.render(scene, camera);
            });
        });
    </script>
</body>
</html>
