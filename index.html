<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
    <a-scene  mindar-image="imageTargetSrc: targets.mind;"
              vr-mode-ui="enabled: false"
              device-orientation-permission-ui="enabled: false">

        <a-assets>
            <a-asset-item id="avatarModel" src="avatar_1.glb"></a-asset-item>
        </a-assets>

        <!-- カメラ -->
        <a-camera id="camera" look-controls="enabled: false">

            <!-- :white_check_mark: 画面中央・常にこちら向き -->
            <a-entity      id="avatar"
                           position="0 0 -1.2"
                           rotation="0 0 0"
                           visible="false">

                <a-gltf-model        src="#avatarModel"
                                     scale="0.6 0.6 0.6"
                                     animation-mixer="clip: Idle; loop: repeat">
                </a-gltf-model>

            </a-entity>

        </a-camera>

    </a-scene>

</body>
</html>
