<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden; /* 横スクロールを防止 */
            background-color: black;
        }
    </style>
</head>
<body>
    <a-scene mindar-image="imageTargetSrc: targets.mind;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights">
        <a-assets>
            <a-asset-item id="greif" src="avatar_1.glb"></a-asset-item>
        </a-assets>
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- MindAR のマーカーを検出するエンティティ -->


        <!-- JavaScript を用いてマーカーの検出状態を監視 -->
        <script>
            // MindAR のコンポーネントが読み込まれた後、イベントリスナーを設定
            window.addEventListener('load', function () {
                const markerEntity = document.getElementById('markerEntity');
                const avatarModel = document.getElementById('avatarModel');

                markerEntity.addEventListener('mindar-image-target-appeared', function (event) {
                    // マーカーが検出されたときにアバターを表示
                    avatarModel.setAttribute('visible', 'true');
                });

                markerEntity.addEventListener('mindar-image-target-disappeared', function (event) {
                    // マーカーが消失してもアバターの表示を保持
                    avatarModel.setAttribute('visible', 'true');
                });
            });
        </script>
    </a-scene>
</body>
</html>
