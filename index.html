<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindAR ビデオフィード背景</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div id="container">
        <!-- ARコンテンツがここに表示されます -->
    </div>
    <!-- MindARとThree.jsのスクリプト -->
    <script src="https://cdn.jsdelivr.net/npm/@mind-ar/webxr@latest/dist/mindar-three.min.js"></script>
    <script src="https://unpkg.com/three@0.165.0/build/three.min.js"></script>
    <!-- カスタムスクリプト -->
    <script src="app.js"></script>
</body>
</html>
