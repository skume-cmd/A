<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AR Debug</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background:black;
            width:100%;
            height:100%;
        }

        /* カメラとcanvasを画面いっぱいに */
        video, canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>

    <!-- Three.js -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.126/build/three.min.js"></script>

    <!-- GLTFLoader -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.126/examples/js/loaders/GLTFLoader.js"></script>

    <!-- MindAR -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-three.prod.js"></script>

</head>

<body>

    <script>
        (async () => {

            console.log("START");

            const mindarThree = new window.MINDAR.IMAGE.MindARThree({
                container: document.body,
                imageTargetSrc: './targets.mind'
            });

            const { renderer, scene, camera } = mindarThree;

            // 🔴 デバッグ用：絶対見える赤い箱
            const geo = new THREE.BoxGeometry(1, 1, 1);
            const mat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            const cube = new THREE.Mesh(geo, mat);

            // anchorに追加（マーカー上に出る）
            const anchor = mindarThree.addAnchor(0);
            anchor.group.add(cube);

            anchor.onTargetFound = () => {
                console.log("認識した！");
            };

            anchor.onTargetLost = () => {
                console.log("見失った！");
            };

            // ARスタート
            console.log("before start");
            await mindarThree.start();
            renderer.SetClearColor(0xf000000, 0);
            console.log("after start");

            // 描画
            renderer.setAnimationLoop(() => {
                renderer.render(scene, camera);
            });

        })();
    </script>

</body>
</html>
