<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

    <!-- Three.jsïŋ―iïŋ―ïŋ―ïŋ―Ėoïŋ―[ïŋ―Wïŋ―ïŋ―ïŋ―ïŋ―ïŋ―dïŋ―vïŋ―j -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.126/build/three.min.js"></script>

    <!-- GLTFLoader -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.126/examples/js/loaders/GLTFLoader.js"></script>

    <!-- MindAR -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.4/dist/mindar-image-three.prod.js"></script>

</head>
<body style="margin:0;">

    <script>
        const start = async () => {

            const mindarThree = new window.MINDAR.IMAGE.MindARThree({
                container: document.body,
                imageTargetSrc: './targets.mind'
            });

            const { renderer, scene, camera } = mindarThree;

            // ïŋ―ïŋ―ïŋ―Cïŋ―g
            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            scene.add(light);

            // GLBïŋ―ĮÝïŋ―ïŋ―ïŋ―
            const loader = new THREE.GLTFLoader();
            const gltf = await loader.loadAsync('./avatar_1.glb');

            // ïŋ―Aïŋ―ïŋ―ïŋ―Jïŋ―[ïŋ―iïŋ―æïŋ―ÉRïŋ―Ãïŋ―ïŋ―j
            const anchor = mindarThree.addAnchor(0);
            anchor.group.add(gltf.scene);

            // ïŋ―Tïŋ―Cïŋ―Yïŋ―ïŋ―ïŋ―ïŋ―
            gltf.scene.scale.set(0.5, 0.5, 0.5);

            await mindarThree.start();

            renderer.setAnimationLoop(() => {
                renderer.render(scene, camera);
            });
        };

        start();
    </script>

</body>
</html>
