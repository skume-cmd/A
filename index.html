<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>

<body>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;"
             color-space="sRGB"
             renderer="colorManagement: true, physicallyCorrectLights"
             vr-mode-ui="enabled: false"
             device-orientation-permission-ui="enabled: false">

        <a-assets>
            <a-asset-item id="avatarModel" src="./models/character.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- ★ライト追加（超重要） -->
        <a-entity light="type: ambient; intensity: 1"></a-entity>
        <a-entity light="type: directional; intensity: 1" position="1 1 1"></a-entity>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model src="#avatarModel"
                          position="0 0 0.3"
                          scale="0.2 0.2 0.2"
                          animation-mixer="clip: HumanArmature|HumanArmature|Man_Jump; loop: repeat"
                          animation__rotate="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
            </a-gltf-model>
        </a-entity>
        <a-plane id="speech"
                 position="0 0.5 0.3"
                 width="1"
                 height="0.3"
                 color="#ffffff"
                 text="value: こんにちは！; align: center; color: black"
                 visible="false"></a-plane>
    </a-scene>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const target = document.querySelector("#target");
            const speech = document.querySelector("#speech");
            const audio = document.querySelector("#voice");

            // マーカー検出時
            target.addEventListener("targetFound", () => {
                speech.setAttribute("visible", true);

                audio.currentTime = 0;
                audio.play();
            });

            // マーカー外れたとき
            target.addEventListener("targetLost", () => {
                speech.setAttribute("visible", false);
                audio.pause();
            });
        });
    </script>
</body>
</html>
