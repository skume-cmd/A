<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

    <!-- Three.js（これだけ追加） -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.126/build/three.min.js"></script>

    <!-- MindAR -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-three.prod.js"></script>

    <!-- GLTFLoader -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.126/examples/js/loaders/GLTFLoader.js"></script>

</head>

<body>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
        }

        video, canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover; /* ← 超重要 */
        }

        #ar-container {
            width: 100vw;
            height: 100vh;
            position: fixed;
        }

        #debug {
            position: fixed;
            top: 0;
            left: 0;
            color: red;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
            font-size: 20px;
        }
    </style>
    <div id="ar-container"></div>
    <div id="debug"></div>
    <button id="rescanBtn" style="
position: fixed;
bottom: 20px;
left: 50%;
transform: translateX(-50%);
z-index: 9999;
padding: 12px 20px;
font-size: 16px;
display: none; /* ← 最初は隠す */
">
        再スキャン
    </button>
    <script>
        const mindarThree = new window.MINDAR.IMAGE.MindARThree({
            container: document.body,
            imageTargetSrc: './targets.mind'
        });

        const { renderer, scene, camera } = mindarThree;

        const geo = new THREE.BoxGeometry(1, 1, 1);
        const mat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const cube = new THREE.Mesh(geo, mat);

        scene.add(cube);

        await mindarThree.start();

        renderer.setAnimationLoop(() => {
            renderer.render(scene, camera);
        });
    </script>

</body>
</html>
