<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden; /* 横スクロールを防止 */
            background-color: black;
        }
    </style>
</head>
<body>
    <a-scene mindar-image="imageTargetSrc: targets.mind;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights">
        <a-assets>
            <a-asset-item id="greif" src="avatar_1.glb"></a-asset-item>
        </a-assets>
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- MindAR のマーカーを検出するエンティティ -->
        <a-entity mindar-image-target="targetIndex: 0" id="markerEntity">
            <!-- マーカーが見つかったときに表示される GLTF モデル -->
            <a-gltf-model rotation="90 0 0" position="0 0 0" src="#greif" visible="false" id="avatarModel">
            </a-gltf-model>
        </a-entity>

        <!-- JavaScript を用いてマーカーの検出状態を監視 -->
        
    </a-scene>
</body>
</html>
