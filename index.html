<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; filterMinCF:0.0007; filterBeta: 1; warmupTolerance: 8; missTolerance: 8; "
             color-space="sRGB"
             renderer="colorManagement: true, physicallyCorrectLights"
             vr-mode-ui="enabled: false"
             device-orientation-permission-ui="enabled: false">

        <a-assets>
            <a-asset-item id="avatarModel" src="./models/charcter.glb"></a-asset-item>
            <audio id="voice1" src="./voice1.mp3" preload="auto"></audio>
            <audio id="voice2" src="./voice2.mp3" preload="auto"></audio>
            <audio id="voice3" src="./voice3.mp3" preload="auto"></audio>
            <canvas id="bubble-canvas" width="512" height="256" style="display:none"></canvas>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity light="type: ambient; intensity: 1"></a-entity>
        <a-entity light="type: directional; intensity: 1" position="1 1 1"></a-entity>

        <a-entity mindar-image-target="targetIndex: 0" id="target">
            <a-entity id="anchor">
                <a-gltf-model id="avatar"
                              src="#avatarModel"
                              position="0 0 0.3"
                              scale="0.1 0.1 0.1"
                              rotation="0 0 0"
                              idle-look-at-face
                              animation-mixer="clip: HumanArmature|HumanArmature|Man_Idle; loop: repeat">
                    <a-plane id="bubble-plane"
                             position="0 0.65 0.3"
                             width="1.3" height="0.4"
                             visible="false"
                             smooth-look-at
                             material="src: #bubble-canvas;
                                   transparent: true;
                                   alphaTest: 0.1;
                                   shader: flat;
                                   npot: true">
                    </a-plane>
                </a-gltf-model>

            </a-entity>

        </a-entity>
    </a-scene>

    <script>
        // ══════════════════════════════════════
        // circle-walk コンポーネント（最上部に登録）
        // ══════════════════════════════════════
        let walkAngle = 0;
        let walking = false;
        let anchored = false;

        AFRAME.registerComponent("circle-walk", {
            tick(time, delta) {
                if (!walking) return;
                const radius = 0.4;
                const speed = 0.5;
                walkAngle += speed * (delta / 1000);

                const x = Math.sin(walkAngle) * radius;
                const z = Math.cos(walkAngle) * radius + 0.3;
                this.el.object3D.position.set(x, 0, z);

                this.el.object3D.rotation.x = 0;
                this.el.object3D.rotation.z = 0;
                this.el.object3D.rotation.y = -walkAngle;
            }
        });

        AFRAME.registerComponent("smooth-look-at", {
            init() {
                this.camera = document.querySelector("[camera]").object3D;
                this.tmpMat = new THREE.Matrix4();
                this.targetQuat = new THREE.Quaternion();
            },

            tick() {
                const obj = this.el.object3D;
                const camPos = this.camera.getWorldPosition(new THREE.Vector3());

                this.tmpMat.lookAt(
                    obj.getWorldPosition(new THREE.Vector3()),
                    camPos,
                    new THREE.Vector3(0, 1, 0)
                );
                this.targetQuat.setFromRotationMatrix(this.tmpMat);

                // 少し強めでもOK
                obj.quaternion.slerp(this.targetQuat, 0.08);
            }
        });

        AFRAME.registerComponent("idle-look-at-face", {
            init() {
                this.camera = document.querySelector("[camera]").object3D;
                this.tmpVec = new THREE.Vector3();
                this.tmpMat = new THREE.Matrix4();
                this.targetQuat = new THREE.Quaternion();
                this.head = null;
                this.isIdle = true;

                this.el.addEventListener("model-loaded", () => {
                    this.el.getObject3D("mesh").traverse(o => {
                        if (o.isBone && o.name === "Head") this.head = o;
                    });
                });

                this.el.addEventListener("animation-mixer-started", e => {
                    this.isIdle = e.detail.clip.name.includes("Idle");
                });
            },

            tick() {
                if (!this.isIdle || !this.head) return;

                this.camera.getWorldPosition(this.tmpVec);
                this.head.getWorldPosition(this.tmpMat.elements);

                this.tmpMat.lookAt(
                    this.head.getWorldPosition(new THREE.Vector3()),
                    this.tmpVec,
                    new THREE.Vector3(0, 1, 0)
                );
                this.targetQuat.setFromRotationMatrix(this.tmpMat);

                // ★ 即座に向かない。ゆっくり寄せる
                this.head.quaternion.slerp(this.targetQuat, 0.05);
            }
        });

        // ══════════════════════════════════════
        // 吹き出し描画
        // ══════════════════════════════════════
        function drawBubble(text) {
            const canvas = document.getElementById("bubble-canvas");
            const ctx = canvas.getContext("2d");
            const W = canvas.width;
            const H = canvas.height;

            ctx.clearRect(0, 0, W, H);

            const fontSize = 44;
            const lineHeight = fontSize * 1.4;
            ctx.font = `bold ${fontSize}px sans-serif`;

            const lines = text.split("\n");

            const textBlockH = lines.length * lineHeight;
            const padV = 28;
            const tailH = 36;
            const bx = 16, by = 16;
            const bw = W - 32;
            const bh = textBlockH + padV * 2;
            const r = 24;

            ctx.beginPath();
            ctx.moveTo(bx + r, by);
            ctx.lineTo(bx + bw - r, by);
            ctx.arcTo(bx + bw, by, bx + bw, by + r, r);
            ctx.lineTo(bx + bw, by + bh - r);
            ctx.arcTo(bx + bw, by + bh, bx + bw - r, by + bh, r);
            ctx.lineTo(W / 2 + 28, by + bh);
            ctx.lineTo(W / 2, by + bh + tailH);
            ctx.lineTo(W / 2 - 28, by + bh);
            ctx.lineTo(bx + r, by + bh);
            ctx.arcTo(bx, by + bh, bx, by + bh - r, r);
            ctx.lineTo(bx, by + r);
            ctx.arcTo(bx, by, bx + r, by, r);
            ctx.closePath();

            ctx.shadowColor = "rgba(0,0,0,0.2)";
            ctx.shadowBlur = 14;
            ctx.shadowOffsetY = 4;
            ctx.fillStyle = "white";
            ctx.fill();
            ctx.shadowColor = "transparent";
            ctx.strokeStyle = "rgba(0,0,0,0.1)";
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.fillStyle = "#222222";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            const startY = by + padV + fontSize / 2;
            lines.forEach((line, i) => {
                ctx.fillText(line, W / 2, startY + i * lineHeight);
            });

            const plane = document.getElementById("bubble-plane");
            if (plane && plane.components.material) {
                plane.components.material.material.map.needsUpdate = true;
            }
        }

        // ══════════════════════════════════════
        // パーティクル生成
        // ══════════════════════════════════════
        function spawnParticles() {
            const anchor = document.querySelector("#anchor");
            const colors = ["#FFD700", "#FF69B4", "#00BFFF", "#7FFF00", "#FF4500", "#DA70D6", "#FF8C00", "#ADFF2F"];
            const count = 10;

            for (let i = 0; i < count; i++) {
                const p = document.createElement("a-sphere");
                const angle = (i / count) * Math.PI * 2;
                const dist = 0.4 + Math.random() * 0.3;
                const tx = Math.cos(angle) * dist;
                const ty = 0.3 + Math.random() * 0.5;
                const dur = 600 + Math.floor(Math.random() * 400);
                const color = colors[i % colors.length];

                p.setAttribute("position", "0 0.1 0");
                p.setAttribute("radius", 0.015 + Math.random() * 0.015);
                p.setAttribute("color", color);
                p.setAttribute("material", "transparent: true; opacity: 1");
                p.setAttribute("animation",
                    `property: position; to: ${tx} ${ty} 0.3; dur: ${dur}; easing: easeOutQuad`);
                p.setAttribute("animation__fade",
                    `property: components.material.material.opacity; from: 1; to: 0; dur: ${dur}`);

                anchor.appendChild(p);
                setTimeout(() => p.parentNode && p.parentNode.removeChild(p), dur + 100);
            }
        }

        // ══════════════════════════════════════
        // メイン処理
        // ══════════════════════════════════════
        document.addEventListener("DOMContentLoaded", () => {
            const target = document.querySelector("#target");
            const plane = document.querySelector("#bubble-plane");
            const avatar = document.querySelector("#avatar");
            const voices = [
                document.querySelector("#voice1"),
                document.querySelector("#voice2"),
                document.querySelector("#voice3"),
            ];
            // ── セリフ・音声・アニメーションの定義 ──
            const sequence = [
                { text: "こんにちは！\nナビゲーターです", voice: voices[0], clip: "HumanArmature|HumanArmature|Man_Walk" },
                { text: "私たちは、\n会社。", voice: voices[1], clip: "Wave" },
                { text: "今日は、ご紹介します。", voice: voices[2], clip: "Idle" },
            ];

            let started = false;

            drawBubble("タップしてください");

            // ── セリフ自動再生 ────────────────────
            function playSequence(idx) {
                if (idx >= sequence.length) {
                    // 全部終わったら待機
                    avatar.setAttribute("animation-mixer", "clip: HumanArmature|HumanArmature|Man_Idle; loop: repeat");
                    avatar.removeAttribute("circle-walk");
                    stopWalking();
                    avatar.setAttribute("smooth-follow", "");
                    return;
                }

                const { text, voice, clip } = sequence[idx];

                drawBubble(text);

                // アニメーション切り替え
                avatar.setAttribute("animation-mixer", `clip: ${clip}; loop: repeat`);

                // Walk のときだけ円歩きON
                if (clip === "HumanArmature|HumanArmature|Man_Walk") {
                    walkAngle = 0;
                    walking = true;
                    avatar.setAttribute("circle-walk", "");
                } else {
                    stopWalking();
                    walking = false;
                    avatar.removeAttribute("circle-walk");
                }

                // 音声再生 → 終わったら次へ
                voice.currentTime = 0;
                voice.play().catch(e => console.warn("再生エラー:", e));
                voice.addEventListener("ended", () => {
                    playSequence(idx + 1);
                }, { once: true });
            }
            
            // ── マーカー検出 ──────────────────────
            target.addEventListener("targetFound", () => {
                if (anchored) return;
                anchored = true;

                plane.setAttribute("visible", true);
                spawnParticles();

                // ★ ここが重要
                avatar.removeAttribute("animation-mixer");

                avatar.setAttribute("animation-mixer", {
                    clip: "start",
                    loop: "once",
                    clampWhenFinished: true,
                    crossFadeDuration: 0.15
                });

                avatar.addEventListener("animation-finished", () => {
                    avatar.setAttribute("animation-mixer", {
                        clip: "HumanArmature|HumanArmature|Man_Idle",
                        loop: "repeat",
                        crossFadeDuration: 0.2
                    });
                }, { once: true });
            });

            // ── マーカー消失 ──────────────────────
            target.addEventListener("targetLost", () => {
                
            });

            function stopWalking() {
                avatar.removeAttribute("circle-walk");
                walkAngle = 0;
            }

            // ── タップで開始 ──────────────────────
            document.body.addEventListener("click", () => {
                if (started) return;
                started = true;
                playSequence(0);
            });
        });
    </script>
</body>
</html>
